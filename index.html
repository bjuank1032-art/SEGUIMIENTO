<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Splendor v13.1 - Meta Simple & Ruta Pro</title>
    
    <!-- [CONFIGURACIÓN APPLE] -->
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="apple-touch-icon" href="https://img.icons8.com/color/96/cannabis.png">
    
    <!-- [DEPENDENCIAS] -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
        
        :root {
            --espacio-superior-seguro: env(safe-area-inset-top);
            --espacio-inferior-seguro: env(safe-area-inset-bottom);
            --oro-victoria: #ffd700;
            --oro-brillo: rgba(255, 215, 0, 0.2);
            --brillo-metalico: linear-gradient(135deg, #2c2c2e 0%, #000000 100%);
        }

        body {
            background-color: black;
            color: #e5e5e5;
            font-family: 'Inter', -apple-system, sans-serif;
            -webkit-tap-highlight-color: transparent;
            overscroll-behavior-y: contain;
            padding-top: var(--espacio-superior-seguro);
            padding-bottom: calc(var(--espacio-inferior-seguro) + 140px);
        }

        /* Animaciones */
        .AnimacionEntrada { animation: aparecer 0.4s ease-out forwards; }
        @keyframes aparecer { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        /* Estética Victorias */
        .TarjetaVictoriaOro {
            background: linear-gradient(145deg, #0f0f0f 0%, #1a1a1a 100%);
            border: 2px solid var(--oro-victoria);
            border-radius: 3rem;
            position: relative;
            overflow: hidden;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.8);
        }

        .DestelloMetalico {
            position: absolute;
            top: 0; left: -100%; width: 60%; height: 100%;
            background: linear-gradient(to right, transparent, rgba(255,255,255,0.05), transparent);
            transform: skewX(-25deg);
            animation: destello 6s infinite;
        }
        @keyframes destello { 0% { left: -120%; } 15% { left: 150%; } 100% { left: 150%; } }

        .ContenedorDetallesRuta {
            max-height: 0;
            overflow: hidden;
            transition: max-height 0.5s cubic-bezier(0.4, 0, 0.2, 1), opacity 0.3s ease;
            opacity: 0;
        }
        .ContenedorDetallesRuta.Abierto { max-height: 1000px; opacity: 1; margin-top: 2rem; }

        /* UI Global */
        .VentanaCristal {
            background: rgba(15, 15, 15, 0.9);
            backdrop-filter: blur(30px);
            -webkit-backdrop-filter: blur(30px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .ContenedorIconoEmoji { font-family: "Apple Color Emoji", sans-serif; font-size: 1.6rem; display: flex; align-items: center; justify-content: center; }
        
        input[type="range"] { -webkit-appearance: none; background: #1a1a1a; height: 6px; border-radius: 10px; width: 100%; }
        input[type="range"]::-webkit-slider-thumb { -webkit-appearance: none; width: 24px; height: 24px; background: white; border-radius: 50%; border: 4px solid #000; cursor: pointer; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        /* --- COMPONENTE ICONO --- */
        const Icon = ({ name, className = "w-5 h-5", color = "currentColor" }) => {
            const iconRef = useRef(null);
            useEffect(() => {
                if (!iconRef.current) return;
                iconRef.current.innerHTML = '';
                const cleanName = name || "Zap";
                const isEmoji = /\p{Emoji}/u.test(cleanName) && !/^[a-zA-Z0-9-]+$/.test(cleanName);
                if (isEmoji) {
                    iconRef.current.innerHTML = `<span class="ContenedorIconoEmoji ${className.includes('w-10') ? 'text-4xl' : ''}">${cleanName}</span>`;
                } else if (window.lucide) {
                    const i = document.createElement('i');
                    const lucideName = cleanName.replace(/([a-z])([A-Z0-9])/g, '$1-$2').toLowerCase();
                    i.setAttribute('data-lucide', lucideName);
                    i.className = className; i.style.stroke = color; i.style.strokeWidth = "2.5";
                    iconRef.current.appendChild(i);
                    window.lucide.createIcons();
                }
            }, [name, className, color]);
            return <span ref={iconRef} className="flex items-center justify-center pointer-events-none"></span>;
        };

        const KEY_H = 'res_v13_habits_simple';
        const KEY_R = 'res_v13_roadmap_pro';
        const PALETA = ["#ef4444", "#f97316", "#fbbf24", "#10b981", "#3b82f6", "#8b5cf6", "#d946ef"];

        const getToday = () => {
            const d = new Date();
            const offset = d.getTimezoneOffset() * 60000;
            return (new Date(d - offset)).toISOString().split('T')[0];
        };

        const App = () => {
            const [activeTab, setActiveTab] = useState('metas');
            const [habits, setHabits] = useState([]);
            const [steps, setSteps] = useState([
                { id: 1, title: "Reset Bioquímico", icon: '🔥', aura: PALETA[0], purpose: "Limpiar dopamina barata.", tasks: ["AYUNO DOPAMINA"], victory: "15 días limpios." }
            ]);
            
            const [showHabitModal, setShowHabitModal] = useState(false);
            const [showRoadmapModal, setShowRoadmapModal] = useState(false);
            const [showSettings, setShowSettings] = useState(false);
            const [expandedRoadmapId, setExpandedRoadmapId] = useState(null);
            
            const [editingId, setEditingId] = useState(null);
            const [fName, setFName] = useState("");
            const [fIcon, setFIcon] = useState("🔥");
            const [fColor, setFColor] = useState("#007aff");
            const [fTarget, setFTarget] = useState(21);

            const [fRTitle, setFRTitle] = useState("");
            const [fRIcon, setFRIcon] = useState("⚡");
            const [fRPurpose, setFRPurpose] = useState("");
            const [fRTasks, setFRTasks] = useState("");
            const [fRVictory, setFRVictory] = useState("");

            useEffect(() => {
                const h = JSON.parse(localStorage.getItem(KEY_H));
                const r = JSON.parse(localStorage.getItem(KEY_R));
                if (h && Array.isArray(h)) setHabits(h);
                if (r && Array.isArray(r)) setSteps(r);
            }, []);

            useEffect(() => {
                localStorage.setItem(KEY_H, JSON.stringify(habits));
                localStorage.setItem(KEY_R, JSON.stringify(steps));
            }, [habits, steps]);

            const handleMark = (id) => {
                const hoy = getToday();
                setHabits(prev => prev.map(h => (h.id === id && !h.history.includes(hoy)) ? { ...h, history: [...h.history, hoy] } : h));
            };

            const handleUndo = (id, e) => {
                e.stopPropagation();
                const hoy = getToday();
                setHabits(prev => prev.map(h => h.id === id ? { ...h, history: h.history.filter(d => d !== hoy) } : h));
            };

            const saveHabit = () => {
                if (!fName) return;
                const data = { name: fName, icon: fIcon, color: fColor, targetDays: fTarget };
                if (editingId) setHabits(habits.map(h => h.id === editingId ? { ...h, ...data } : h));
                else setHabits([...habits, { id: 'h'+Date.now(), ...data, history: [] }]);
                setShowHabitModal(false); setEditingId(null); setFName(""); setFTarget(21);
            };

            const saveStep = () => {
                if (!fRTitle) return;
                const tasksArr = fRTasks.split('\n').filter(t => t.trim()).map(t => t.toUpperCase());
                const aura = PALETA[steps.length] || PALETA[PALETA.length-1];
                const data = { 
                    id: steps.length + 1, 
                    title: fRTitle, 
                    icon: fRIcon, 
                    purpose: fRPurpose || "Propósito no definido", 
                    tasks: tasksArr.length > 0 ? tasksArr : ["PASO NO DEFINIDO"], 
                    victory: fRVictory || "Victoria por definir", 
                    aura 
                };
                setSteps([...steps, data]);
                setShowRoadmapModal(false); setFRTitle(""); setFRPurpose(""); setFRTasks(""); setFRVictory("");
            };

            const activeHabits = habits.filter(h => h.history.length < (h.targetDays || 21));
            const completedHabits = habits.filter(h => h.history.length >= (h.targetDays || 21));

            const obtenerEnergiaDeLinea = () => {
                const colores = steps.map(s => s.aura || '#333');
                if (colores.length === 0) return "#333";
                if (colores.length === 1) return colores[0];
                return `linear-gradient(to bottom, ${colores.join(', ')})`;
            };

            const renderMetas = () => (
                <div className="AnimacionEntrada pb-32">
                    <header className="px-6 py-10 flex justify-between items-center">
                        <div>
                            <h1 className="text-4xl font-black italic tracking-tighter uppercase text-white leading-none">Seguimiento</h1>
                            <p className="text-[10px] font-black text-neutral-600 uppercase tracking-[0.3em] mt-3">Misión: {activeHabits.length} Objetivos</p>
                        </div>
                        <button onClick={() => setShowSettings(true)} className="w-14 h-14 bg-neutral-900 border border-neutral-800 rounded-full flex items-center justify-center">
                            <Icon name="Settings" className="w-6 h-6" color="#FFF" />
                        </button>
                    </header>

                    <div className="px-4 grid gap-5">
                        {activeHabits.map(h => {
                            const target = h.targetDays || 21;
                            const porc = Math.round((h.history.length / target) * 100);
                            const done = h.history.includes(getToday());
                            return (
                                <div key={h.id} onClick={() => handleMark(h.id)} className={`bg-neutral-900/40 border border-neutral-800 rounded-[2.5rem] p-7 relative transition-all ${done ? 'opacity-40' : 'active:scale-95 cursor-pointer'}`} style={{ borderLeft: `10px solid ${h.color}` }}>
                                    <div className="flex justify-between items-center mb-6">
                                        <div className="flex items-center gap-5">
                                            <div className="w-14 h-14 bg-black rounded-2xl flex items-center justify-center border border-neutral-800"><Icon name={h.icon} className="w-8 h-8" /></div>
                                            <div>
                                                <h3 className="text-2xl font-bold text-white italic leading-none">{h.name}</h3>
                                                <span className="text-[10px] font-black text-neutral-500 uppercase">{h.history.length} / {target} Días</span>
                                            </div>
                                        </div>
                                        <button onClick={(e) => handleUndo(h.id, e)} className="w-10 h-10 bg-black rounded-xl border border-neutral-800 flex items-center justify-center text-neutral-600 hover:text-white transition-colors"><Icon name="RotateCcw" className="w-4 h-4" /></button>
                                    </div>
                                    <div className="h-3 bg-black rounded-full overflow-hidden border border-neutral-800 p-[2px]">
                                        <div className="h-full transition-all duration-1000 rounded-full" style={{ width: `${porc}%`, backgroundColor: h.color }} />
                                    </div>
                                </div>
                            );
                        })}
                        <button onClick={() => setShowHabitModal(true)} className="border-2 border-dashed border-neutral-800 rounded-[2.5rem] p-12 flex flex-col items-center gap-3 text-neutral-700 bg-neutral-900/10 hover:border-neutral-600 transition-colors">
                            <Icon name="Plus" className="w-8 h-8" />
                            <span className="text-xs font-black uppercase tracking-widest">Nueva Misión</span>
                        </button>
                    </div>
                </div>
            );

            const renderVictorias = () => (
                <div className="AnimacionEntrada pb-32 px-4">
                    <header className="py-20 text-center">
                        <h1 className="text-5xl font-black italic text-[#ffd700] uppercase tracking-tighter">Salón de Honor</h1>
                        <p className="text-[10px] font-black text-neutral-700 uppercase tracking-[0.5em] mt-3">Legado de Disciplina</p>
                    </header>
                    <div className="grid gap-8">
                        {completedHabits.length > 0 ? completedHabits.map(v => (
                            <div key={v.id} className="TarjetaVictoriaOro p-8">
                                <div className="DestelloMetalico"></div>
                                <div className="flex justify-between items-start relative z-10 mb-8">
                                    <div className="w-20 h-20 bg-black rounded-3xl flex items-center justify-center border border-[#ffd70033] shadow-2xl"><Icon name={v.icon} className="w-10 h-10" /></div>
                                    <Icon name="Trophy" className="w-8 h-8 text-[#ffd700]" />
                                </div>
                                <h3 className="text-3xl font-black italic uppercase text-white relative z-10 leading-none">{v.name}</h3>
                                <p className="text-[10px] font-black text-[#ffd700] uppercase tracking-widest mt-4 opacity-60">Consagrado tras {v.targetDays} días</p>
                            </div>
                        )) : (
                            <div className="text-center py-20 opacity-20 uppercase font-black text-xs tracking-widest">Sin conquistas aún</div>
                        )}
                    </div>
                </div>
            );

            const renderRuta = () => (
                <div className="AnimacionEntrada pb-32 px-4">
                    <header className="py-10 border-b border-neutral-800 mb-12">
                        <h1 className="text-4xl font-black italic tracking-tighter text-white uppercase">Plan Maestro</h1>
                        <p className="text-[10px] font-black text-neutral-700 uppercase tracking-[0.3em] mt-3">Arquitectura de Vida</p>
                    </header>
                    <div className="relative">
                        {/* CONTENEDOR DE PASOS CON LÍNEA CONTROLADA */}
                        <div className="relative">
                            <div 
                                className="absolute left-[27px] top-0 bottom-6 w-1 rounded-full opacity-60 transition-all duration-1000"
                                style={{ 
                                    background: obtenerEnergiaDeLinea(),
                                    boxShadow: `0 0 15px ${steps[0]?.aura || '#333'}33`
                                }}
                            ></div>
                            
                            <div className="space-y-10">
                                {steps.map(s => {
                                    const isOpen = expandedRoadmapId === s.id;
                                    const tasks = s.tasks || [];
                                    return (
                                        <div key={s.id} className="flex items-start gap-6 relative z-10">
                                            <div className="w-14 h-14 min-w-[3.5rem] rounded-[1.2rem] flex items-center justify-center border-2 bg-black shadow-2xl mt-1 transition-all duration-500" style={{ borderColor: s.aura || '#333', color: s.aura || '#FFF', boxShadow: isOpen ? `0 0 20px ${s.aura}44` : 'none' }}>
                                                <span className="font-black italic text-xl">{s.id}</span>
                                            </div>
                                            <div onClick={() => setExpandedRoadmapId(isOpen ? null : s.id)} className="flex-1 p-8 rounded-[3rem] border-2 bg-neutral-900/30 backdrop-blur-md cursor-pointer transition-all" style={{ borderColor: `${s.aura || '#333'}33` }}>
                                                <div className="flex items-center gap-5">
                                                    <div className="p-3 bg-neutral-800 rounded-2xl shadow-inner border border-white/5"><Icon name={s.icon || 'Zap'} className="w-6 h-6" /></div>
                                                    <h3 className="text-2xl font-black text-white italic uppercase tracking-tighter leading-none">{s.title}</h3>
                                                </div>
                                                <div className={`ContenedorDetallesRuta ${isOpen ? 'Abierto' : ''}`}>
                                                    <div className="space-y-8 pt-4">
                                                        <div><label className="text-[9px] font-black text-neutral-600 uppercase block mb-2">Propósito</label><p className="text-lg font-bold italic text-neutral-200">"{s.purpose}"</p></div>
                                                        <div>
                                                            <label className="text-[9px] font-black text-neutral-600 uppercase block mb-3">Conquistas Necesarias</label>
                                                            {tasks.map((t, i) => <div key={i} className="flex items-center gap-3 text-xs font-bold text-neutral-400 uppercase mb-2"><div className="w-1.5 h-1.5 rounded-full" style={{background: s.aura}}></div>{t}</div>)}
                                                        </div>
                                                        <div className="p-5 bg-neutral-800/50 rounded-2xl border border-white/5"><label className="text-[9px] font-black text-neutral-600 uppercase block mb-1">Criterio de Ascenso</label><p className="text-xs font-black text-white uppercase">{s.victory}</p></div>
                                                    </div>
                                                </div>
                                            </div>
                                        </div>
                                    );
                                })}
                            </div>
                        </div>

                        {/* BOTÓN FUERA DEL FLUJO DE LA LÍNEA VERTICAL */}
                        <button onClick={() => setShowRoadmapModal(true)} className="flex items-center gap-6 mt-10 opacity-60 hover:opacity-100 transition-all cursor-pointer group relative z-10">
                            <div className="w-14 h-14 rounded-[1.2rem] border-2 border-dashed border-neutral-700 bg-black text-neutral-500 group-hover:border-neutral-400 group-hover:text-white transition-all flex items-center justify-center">
                                <Icon name="Plus" />
                            </div>
                            <span className="text-[10px] font-black uppercase text-neutral-600 group-hover:text-neutral-400">Nuevo Hito</span>
                        </button>
                    </div>
                </div>
            );

            return (
                <div className="min-h-screen max-w-xl mx-auto">
                    {activeTab === 'metas' && renderMetas()}
                    {activeTab === 'victorias' && renderVictorias()}
                    {activeTab === 'ruta' && renderRuta()}

                    <nav className="fixed bottom-8 left-1/2 -translate-x-1/2 bg-neutral-900/90 backdrop-blur-3xl border border-neutral-800 rounded-[3rem] p-2 flex gap-1 z-[100] w-[92%] max-sm:w-[95%] max-w-sm shadow-2xl">
                        <button onClick={() => setActiveTab('metas')} className={`flex-1 py-4 rounded-[2.5rem] flex flex-col items-center gap-1 font-black uppercase text-[9px] transition-all ${activeTab === 'metas' ? 'bg-white text-black scale-105' : 'text-neutral-500 opacity-60'}`}><Icon name="Activity" className="w-4 h-4" /> Metas</button>
                        <button onClick={() => setActiveTab('victorias')} className={`flex-1 py-4 rounded-[2.5rem] flex flex-col items-center gap-1 font-black uppercase text-[9px] transition-all ${activeTab === 'victorias' ? 'bg-[#ffd700] text-black scale-105 shadow-lg' : 'text-neutral-500 opacity-60'}`}><Icon name="Trophy" className="w-4 h-4" /> Victorias</button>
                        <button onClick={() => setActiveTab('ruta')} className={`flex-1 py-4 rounded-[2.5rem] flex flex-col items-center gap-1 font-black uppercase text-[9px] transition-all ${activeTab === 'ruta' ? 'bg-white text-black scale-105' : 'text-neutral-500 opacity-60'}`}><Icon name="Map" className="w-4 h-4" /> Ruta</button>
                    </nav>

                    {/* MODAL METAS */}
                    {showHabitModal && (
                        <div className="fixed inset-0 z-[2000] flex items-center justify-center p-6 bg-black/80 backdrop-blur-sm AnimacionEntrada">
                            <div className="VentanaCristal w-full max-w-md rounded-[3.5rem] p-8 space-y-8 shadow-2xl">
                                <div className="flex justify-between items-center"><h2 className="text-2xl font-black italic uppercase text-white">Nueva Meta</h2><button onClick={() => setShowHabitModal(false)} className="text-[10px] font-black uppercase text-neutral-500">Cerrar</button></div>
                                <input value={fName} onChange={e => setFName(e.target.value)} className="w-full bg-black border border-neutral-800 p-5 rounded-2xl text-white italic font-bold outline-none focus:border-white/20" placeholder="Nombre de la Misión..." />
                                <div className="grid grid-cols-2 gap-4">
                                    <input value={fIcon} onChange={e => setFIcon(e.target.value)} className="w-full h-[58px] bg-black border border-neutral-800 rounded-2xl text-white text-center text-2xl outline-none" />
                                    <div className="h-[58px] rounded-2xl border border-neutral-800 bg-black flex items-center justify-center relative overflow-hidden">
                                        <div className="w-6 h-6 rounded-full" style={{background: fColor, boxShadow: `0 0 10px ${fColor}66`}}></div>
                                        <input type="color" className="absolute opacity-0 inset-0 cursor-pointer" value={fColor} onChange={e => setFColor(e.target.value)} />
                                    </div>
                                </div>
                                <div><div className="flex justify-between text-[10px] font-black uppercase text-neutral-500 mb-3"><span>Días para Consagrar</span><span>{fTarget}</span></div><input type="range" min="1" max="100" value={fTarget} onChange={e => setFTarget(parseInt(e.target.value))} /></div>
                                <button onClick={saveHabit} className="w-full py-6 bg-white text-black font-black rounded-3xl mt-4 uppercase text-sm shadow-2xl active:scale-95 transition-all">Sincronizar Misión</button>
                            </div>
                        </div>
                    )}

                    {/* MODAL RUTA */}
                    {showRoadmapModal && (
                        <div className="fixed inset-0 z-[2000] flex items-center justify-center p-6 bg-black/80 backdrop-blur-sm AnimacionEntrada">
                            <div className="VentanaCristal w-full max-w-md rounded-[3.5rem] p-8 space-y-6 overflow-y-auto max-h-[90vh] shadow-2xl">
                                <h2 className="text-2xl font-black italic uppercase text-white">Nuevo Hito</h2>
                                <input value={fRTitle} onChange={e => setFRTitle(e.target.value)} className="w-full bg-black border border-neutral-800 p-5 rounded-2xl text-white font-bold italic uppercase outline-none" placeholder="Título del Nivel..." />
                                <input value={fRIcon} onChange={e => setFRIcon(e.target.value)} className="w-full bg-black border border-neutral-800 p-5 rounded-2xl text-white text-center text-2xl outline-none" placeholder="Emoji..." />
                                <textarea value={fRPurpose} onChange={e => setFRPurpose(e.target.value)} className="w-full bg-black border border-neutral-800 p-5 rounded-2xl text-white text-sm outline-none" rows="2" placeholder="Propósito Maestro..." />
                                <textarea value={fRTasks} onChange={e => setFRTasks(e.target.value)} className="w-full bg-black border border-neutral-800 p-5 rounded-2xl text-white text-xs outline-none" rows="3" placeholder="Tareas (una por línea)..." />
                                <input value={fRVictory} onChange={e => setFRVictory(e.target.value)} className="w-full bg-black border border-neutral-800 p-5 rounded-2xl text-white text-xs uppercase outline-none" placeholder="Criterio de Victoria..." />
                                <div className="flex gap-4 pt-2">
                                    <button onClick={() => setShowRoadmapModal(false)} className="flex-1 py-5 bg-neutral-800 text-white font-black rounded-2xl uppercase text-[10px]">Cancelar</button>
                                    <button onClick={saveStep} className="flex-[2] py-5 bg-white text-black font-black rounded-2xl uppercase text-[10px] shadow-lg">Añadir</button>
                                </div>
                            </div>
                        </div>
                    )}

                    {/* MODAL AJUSTES */}
                    {showSettings && (
                        <div className="fixed inset-0 z-[2000] flex items-center justify-center p-6 bg-black/80 backdrop-blur-sm AnimacionEntrada">
                            <div className="VentanaCristal w-full max-w-md rounded-[3.5rem] p-10 space-y-6 shadow-2xl">
                                <div className="flex justify-between items-center"><h2 className="text-3xl font-black italic uppercase text-white">Gestión</h2><button onClick={() => setShowSettings(false)} className="text-[10px] font-black uppercase text-neutral-500">Cerrar</button></div>
                                <div className="space-y-4 max-h-[50vh] overflow-y-auto pr-2">
                                    {habits.length > 0 ? habits.map(h => (
                                        <div key={h.id} className="bg-black border border-neutral-800 p-5 rounded-3xl flex justify-between items-center">
                                            <span className="text-sm font-bold flex items-center gap-3"><Icon name={h.icon} className="w-4 h-4" /> {h.name}</span>
                                            <button onClick={() => setHabits(habits.filter(x => x.id !== h.id))} className="p-3 bg-red-900/20 rounded-xl text-red-500 hover:bg-red-900/40 transition-colors"><Icon name="Trash2" className="w-4 h-4" /></button>
                                        </div>
                                    )) : <div className="text-center py-10 opacity-40 font-black uppercase text-[10px]">Sin misiones</div>}
                                </div>
                            </div>
                        </div>
                    )}

                    <footer className="mt-20 text-center pb-40 opacity-40"><p className="text-[10px] font-black text-neutral-800 uppercase tracking-[0.8em]">SPLENDOR • v13.1 • ARQUITECTURA</p></footer>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
